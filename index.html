<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kristen & Josh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,400;0,600;1,400&family=Red+Hat+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0d0d0d;
      --ivory: #f5f0e8;
      --bone: #e8e0d4;
      --accent: #8c8c8c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Red Hat Text', sans-serif;
      background: var(--black);
      color: var(--ivory);
      line-height: 1.6;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 3rem auto;
      max-width: 280px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--bone), transparent);
      opacity: 0.6;
    }
    .divider span {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--accent);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      background:
        radial-gradient(ellipse 80% 50% at 50% 20%, rgba(245, 240, 232, 0.03) 0%, transparent 50%),
        var(--black);
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L30 60M0 30L60 30' stroke='%23f5f0e8' stroke-opacity='0.03' stroke-width='0.5'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .hero h1 {
      font-family: 'Red Hat Display', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .hero .date {
      font-size: clamp(1.15rem, 3.5vw, 1.6rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--accent);
      position: relative;
      z-index: 1;
    }

    .hero-ctas {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      margin-top: 2.5rem;
      max-width: 28rem;
      width: 100%;
    }

    .hero-ctas a {
      flex: 1 1 10rem;
      display: inline-block;
      padding: 1rem 1.75rem;
      border: 1px solid var(--ivory);
      color: var(--ivory);
      font-family: 'Red Hat Text', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s, color 0.2s;
    }

    .hero-ctas a:hover,
    .hero-ctas a:focus-visible {
      background: var(--ivory);
      color: var(--black);
      outline: none;
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>Kristen & Josh</h1>
    <div class="divider"><span>✦</span></div>
    <p class="date">October 2026</p>
    <div class="hero-ctas">
      <a href="asheville.html">Asheville</a>
      <a href="raleigh.html">Raleigh</a>
    </div>
  </header>
</body>
</html>
